<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Belle — Catering Prep Tool</title>
<style>
  /* ── Tokens ─────────────────────────────────────────── */
  :root {
    --teal:    #3c5c68;
    --green:   #99c961;
    --yellow:  #ffde5c;
    --coral:   #fc826d;
    --amber:   #fbaf41;
    --sage:    #9bc4bc;
    --orange:  #d57136;
    --charcoal:#4d4d4d;
    --ink:     #2a2a2a;
    --mist:    #f4f6f5;
    --rule:    #dde3e1;
    --white:   #ffffff;

    --cat-beverage:  #e8f4f8;
    --cat-bowl:      #eaf5ec;
    --cat-gardeners: #fff8e1;
    --cat-griddle:   #fff3e0;
    --cat-handheld:  #f3e5f5;
    --cat-pastry:    #fce4ec;
    --cat-side:      #e8eaf6;
    --cat-superfood: #e0f7fa;

    --font: 'Helvetica Neue', Arial, sans-serif;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--mist); color: var(--ink); font-size: 13px; }

  /* ── Layout ─────────────────────────────────────────── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  .top-bar {
    background: var(--teal);
    color: var(--white);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .top-bar-title { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  .top-bar-sub { font-size: 11px; opacity: 0.7; margin-top: 2px; }

  .tabs {
    display: flex;
    background: var(--teal);
    border-bottom: 3px solid rgba(255,255,255,0.15);
    padding: 0 24px;
    gap: 2px;
  }
  .tab-btn {
    padding: 8px 18px;
    font-size: 12px;
    font-weight: 500;
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -3px;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.03em;
  }
  .tab-btn.active { color: var(--white); border-bottom-color: var(--green); }
  .tab-btn:hover:not(.active) { color: rgba(255,255,255,0.85); }

  .panel { display: none; padding: 20px 24px; }
  .panel.active { display: block; }

  /* ── Page 1: Order Entry ─────────────────────────────── */
  .order-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    max-width: 1100px;
  }
  .cat-card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--rule);
  }
  .cat-header {
    padding: 8px 14px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--white);
  }
  .dish-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    border-bottom: 1px solid var(--rule);
  }
  .dish-row:last-child { border-bottom: none; }
  .dish-name { flex: 1; font-size: 12px; color: var(--ink); }
  .qty-wrap { display: flex; align-items: center; gap: 4px; }
  .qty-btn {
    width: 22px; height: 22px;
    background: var(--mist);
    border: 1px solid var(--rule);
    border-radius: 4px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--charcoal);
    line-height: 1;
  }
  .qty-btn:hover { background: var(--rule); }
  .qty-input {
    width: 38px; height: 28px;
    text-align: center;
    border: 1px solid var(--rule);
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--teal);
    background: #f0f9f5;
    -moz-appearance: textfield;
  }
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .tort-check {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--charcoal);
    cursor: pointer; white-space: nowrap;
  }
  .tort-check input { accent-color: var(--amber); width: 14px; height: 14px; cursor: pointer; }

  .order-actions {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
  }
  .btn {
    padding: 8px 18px;
    border-radius: var(--radius);
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  .btn-primary { background: var(--teal); color: var(--white); }
  .btn-primary:hover { background: #2f4a54; }
  .btn-green { background: var(--green); color: var(--ink); }
  .btn-green:hover { opacity: 0.9; }
  .btn-ghost { background: var(--white); color: var(--charcoal); border: 1px solid var(--rule); }
  .btn-ghost:hover { background: var(--mist); }
  .selected-count { font-size: 12px; color: var(--charcoal); }

  /* ── Page 2: Build Sheet ─────────────────────────────── */
  .build-section { margin-bottom: 20px; }
  .build-dish-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    border-radius: var(--radius) var(--radius) 0 0;
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .build-dish-header .qty-badge {
    background: rgba(255,255,255,0.25);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
  }
  .build-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--white);
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
    border: 1px solid var(--rule);
    border-top: none;
  }
  .build-table th {
    background: #f0f3f2;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--charcoal);
    padding: 5px 10px;
    text-align: left;
    border-bottom: 1px solid var(--rule);
  }
  .build-table th.r { text-align: right; }
  .build-table td {
    padding: 6px 10px;
    font-size: 12px;
    border-bottom: 1px solid var(--rule);
  }
  .build-table tr:last-child td { border-bottom: none; }
  .build-table tr:nth-child(even) td { background: var(--mist); }
  .build-table td.r { text-align: right; font-weight: 600; }
  .build-table td.total { color: var(--teal); font-weight: 700; text-align: right; }
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
  }
  .badge-ingredient { background: #eaf3de; color: #3B6D11; }
  .badge-container  { background: #e1f5ee; color: #0F6E56; }
  .badge-utensil    { background: #faeeda; color: #854F0B; }
  .badge-optional   { background: #f1efe8; color: #5F5E5A; }

  .summary-section {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--rule);
    overflow: hidden;
    margin-top: 24px;
  }
  .summary-header {
    background: var(--teal);
    color: var(--white);
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .summary-sub-header {
    padding: 5px 14px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--white);
  }
  .summary-utensil-hdr { background: #854F0B; }
  .summary-container-hdr { background: #0F6E56; }
  .summary-row {
    display: flex;
    align-items: center;
    padding: 6px 14px;
    border-bottom: 1px solid var(--rule);
    gap: 10px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row:nth-child(even) { background: var(--mist); }
  .summary-name { flex: 1; font-size: 12px; }
  .summary-total { font-size: 13px; font-weight: 700; color: var(--teal); min-width: 40px; text-align: right; }

  .empty-build {
    text-align: center;
    padding: 48px 24px;
    color: var(--charcoal);
  }
  .empty-build .icon { font-size: 32px; margin-bottom: 10px; }
  .empty-build p { font-size: 14px; margin-bottom: 6px; }
  .empty-build small { font-size: 12px; opacity: 0.6; }

  /* ── Page 3: Bag Checklist ──────────────────────────── */
  .checklist-dish { margin-bottom: 16px; }
  .checklist-dish-header {
    padding: 7px 14px;
    border-radius: var(--radius) var(--radius) 0 0;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--white);
    display: flex; align-items: center; justify-content: space-between;
  }
  .checklist-items {
    background: var(--white);
    border: 1px solid var(--rule);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
  }
  .check-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 7px 14px;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: background 0.1s;
  }
  .check-row:last-child { border-bottom: none; }
  .check-row:nth-child(even) { background: var(--mist); }
  .check-row:hover { background: #edf7f0; }
  .check-row.checked { background: #d6f0c2 !important; }
  .check-row.checked .check-item-name { text-decoration: line-through; color: #5a8c3a; }
  .check-row.checked .check-qty { color: #5a8c3a; }
  .check-box {
    width: 18px; height: 18px;
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: var(--white);
    transition: background 0.1s, border-color 0.1s;
  }
  .check-row.checked .check-box {
    background: var(--green);
    border-color: var(--green);
  }
  .check-box-tick { display: none; color: var(--white); font-size: 11px; font-weight: 700; }
  .check-row.checked .check-box-tick { display: block; }
  .check-item-name { flex: 1; font-size: 12px; }
  .check-qty { font-size: 12px; font-weight: 600; color: var(--teal); min-width: 40px; text-align: right; }
  .check-unit { font-size: 11px; color: var(--charcoal); min-width: 60px; }

  .checklist-progress {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .progress-stat { text-align: center; }
  .progress-stat .num { font-size: 24px; font-weight: 700; }
  .progress-stat .lbl { font-size: 10px; color: var(--charcoal); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  .stat-green { color: #3a8a1c; }
  .stat-coral { color: #c24f38; }
  .stat-teal  { color: var(--teal); }
  .progress-bar-wrap { flex: 1; min-width: 120px; }
  .progress-bar-track { height: 6px; background: var(--rule); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.2s; }
  .progress-pct { font-size: 11px; color: var(--charcoal); margin-top: 4px; text-align: right; }

  .checklist-actions { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }

  /* ── Print ───────────────────────────────────────────── */

  /* ── Build Sheet Checklist ──────────────────────────── */
  .build-order-summary { max-width: 700px; }
  .build-cat-block { margin-bottom: 16px; }
  .build-cat-header {
    padding: 7px 14px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: #ffffff;
    border-radius: 6px 6px 0 0;
  }
  .build-dish-row {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 14px;
    border: 1px solid #dde3e1; border-top: none;
  }
  .build-cat-block .build-dish-row:last-child {
    border-radius: 0 0 6px 6px;
  }
  .build-check-box {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 1.5px solid #dde3e1; border-radius: 4px;
    background: #ffffff;
    display: flex; align-items: center; justify-content: center;
  }
  .build-check-tick { display: none; }
  .build-dish-label { flex: 1; font-size: 13px; font-weight: 500; color: #2a2a2a; }
  .build-dish-qty {
    font-size: 13px; font-weight: 700; color: #3c5c68;
    min-width: 36px; text-align: right;
  }
  .tort-badge {
    font-size: 10px; font-weight: 600;
    background: #fff8e1; color: #b07d2a;
    padding: 2px 8px; border-radius: 10px;
  }

  @media print {
    body { background: white; font-size: 11px; }
    .tabs, .top-bar, .order-actions, .checklist-actions, .btn, .qty-btn, .qty-wrap { display: none !important; }
    .panel { display: block !important; padding: 0; }
    #panel-order { display: none !important; }
    .checklist-progress { break-inside: avoid; }
    .build-section, .checklist-dish { break-inside: avoid; }
    .check-row.checked .check-box { background: #99c961 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .check-row.checked { background: #d6f0c2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <div>
      <div class="top-bar-title">Morning Belle — Catering Prep Tool</div>
      <div class="top-bar-sub">Select items on Order Entry, then view Build Sheet and Bag Checklist</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('order')">Order Entry</button>
    <button class="tab-btn" onclick="switchTab('build')">Build Sheet</button>
    <button class="tab-btn" onclick="switchTab('checklist')">Bag Checklist</button>
  </div>

  <!-- ══ TAB 1: ORDER ENTRY ══════════════════════════════ -->
  <div id="panel-order" class="panel active">
    <div class="order-actions">
      <button class="btn btn-primary" onclick="switchTab('build')">View Build Sheet →</button>
      <button class="btn btn-ghost" onclick="clearAll()">Clear All</button>
      <span class="selected-count" id="selected-count">0 items selected</span>
    </div>
    <div class="order-grid" id="order-grid"></div>
  </div>

  <!-- ══ TAB 2: BUILD SHEET ══════════════════════════════ -->
  <div id="panel-build" class="panel">
    <div class="order-actions">
      <button class="btn btn-green" onclick="printBuild()">Print / Save PDF</button>
      <button class="btn btn-ghost" onclick="switchTab('order')">← Back to Order</button>
    </div>
    <div id="build-content"></div>
  </div>

  <!-- ══ TAB 3: BAG CHECKLIST ════════════════════════════ -->
  <div id="panel-checklist" class="panel">
    <div class="checklist-actions">
      <button class="btn btn-green" onclick="printChecklist()">Print / Save PDF</button>
      <button class="btn btn-ghost" onclick="uncheckAll()">Uncheck All</button>
      <button class="btn btn-ghost" onclick="switchTab('order')">← Back to Order</button>
    </div>
    <div id="checklist-progress-bar"></div>
    <div id="checklist-content"></div>
  </div>

</div>

// ── STATE ─────────────────────────────────────────────────
const state = {};
const tortState = {};
const checked = {};
DISHES.forEach(d => { state[d.id] = 0; if (d.tortillas) tortState[d.id] = false; });

// ── ORDER ENTRY RENDER ────────────────────────────────────
function buildOrderEntry() {
  const grid = document.getElementById('order-grid');
  const cats = [...new Set(DISHES.map(d => d.cat))];
  grid.innerHTML = '';
  cats.forEach(cat => {
    const cc = CAT_COLORS[cat] || { bg: '#3c5c68', card: '#f4f6f5' };
    const catDishes = DISHES.filter(d => d.cat === cat);
    const card = document.createElement('div');
    card.className = 'cat-card';
    let html = `<div class="cat-header" style="background:${cc.bg}">${cat}</div>`;
    catDishes.forEach(d => {
      html += `<div class="dish-row">
        <span class="dish-name">${d.name}</span>
        <div class="qty-wrap">
          <button class="qty-btn" onclick="changeQty('${d.id}',-1)">−</button>
          <input class="qty-input" type="number" min="0" max="99" value="0" id="qty_${d.id}"
            oninput="setQty('${d.id}',this.value)">
          <button class="qty-btn" onclick="changeQty('${d.id}',1)">+</button>
        </div>
        ${d.tortillas ? `<label class="tort-check">
          <input type="checkbox" id="tort_${d.id}" onchange="setTort('${d.id}',this.checked)"> Tortillas
        </label>` : ''}
      </div>`;
    });
    card.innerHTML = html;
    grid.appendChild(card);
  });
}

function changeQty(id, delta) {
  state[id] = Math.max(0, (state[id] || 0) + delta);
  const input = document.getElementById('qty_' + id);
  if (input) input.value = state[id];
  updateCount();
}
function setQty(id, val) {
  state[id] = Math.max(0, parseInt(val) || 0);
  updateCount();
}
function setTort(id, val) { tortState[id] = val; }
function clearAll() {
  DISHES.forEach(d => {
    state[d.id] = 0;
    const input = document.getElementById('qty_' + d.id);
    if (input) input.value = 0;
    if (d.tortillas) {
      tortState[d.id] = false;
      const cb = document.getElementById('tort_' + d.id);
      if (cb) cb.checked = false;
    }
  });
  updateCount();
}
function updateCount() {
  const n = DISHES.filter(d => state[d.id] > 0).length;
  document.getElementById('selected-count').textContent = n === 0 ? '0 items selected' : `${n} item${n>1?'s':''} selected`;
}

// ── BUILD SHEET RENDER ────────────────────────────────────
function fmtNum(v) { return v % 1 === 0 ? v : parseFloat(v.toFixed(2)); }

function renderBuild() {
  const container = document.getElementById('build-content');
  const selected = DISHES.filter(d => state[d.id] > 0);
  if (selected.length === 0) {
    container.innerHTML = `<div class="empty-build">
      <div class="icon">📋</div>
      <p>No items selected</p>
      <small>Go to Order Entry and enter quantities to see your build sheet.</small>
    </div>`;
    return;
  }

  const cats = [...new Set(selected.map(d => d.cat))];
  let html = '<div class="build-order-summary">';

  cats.forEach(cat => {
    const cc = CAT_COLORS[cat] || { bg: '#3c5c68' };
    const catDishes = selected.filter(d => d.cat === cat);
    html += `<div class="build-cat-block">
      <div class="build-cat-header" style="background:${cc.bg}">${cat}</div>`;
    catDishes.forEach((d, idx) => {
      const hasTort = d.tortillas && tortState[d.id];
      const bg = idx % 2 === 0 ? '#f7f7f7' : '#ffffff';
      html += `<div class="build-dish-row" style="background:${bg}">
        <div class="build-check-box"><span class="build-check-tick">✓</span></div>
        <span class="build-dish-label">${d.name}</span>
        <span class="build-dish-qty">×${state[d.id]}</span>
        ${hasTort ? '<span class="tort-badge">+ Tortillas</span>' : ''}
      </div>`;
    });
    html += '</div>';
  });
  html += '</div>';

  // Utensil + container totals
  const utensils = {};
  const containers = {};
  selected.forEach(d => {
    const qty = state[d.id];
    const hasTort = d.tortillas && tortState[d.id];
    const rows = [
      ...(d.containers || []),
      ...(d.utensils || []),
      ...(hasTort ? TORTILLA_ITEMS.map(t => [t.name, t.cat, t.base, t.unit]) : [])
    ];
    rows.forEach(([name, cat, base]) => {
      if (cat === 'Utensil') utensils[name] = (utensils[name] || 0) + base * qty;
      if (cat === 'Container') containers[name] = (containers[name] || 0) + base * qty;
    });
  });

  html += '<div class="summary-section" style="margin-top:20px"><div class="summary-header">Utensil & Container Totals</div>';
  html += '<div class="summary-sub-header summary-utensil-hdr">Utensils</div>';
  Object.entries(utensils).forEach(([name, total], i) => {
    html += `<div class="summary-row" style="background:${i%2===0?'#f7f7f7':'#ffffff'}">
      <span class="summary-name">${name}</span>
      <span class="summary-total">${fmtNum(total)}</span>
    </div>`;
  });
  html += '<div class="summary-sub-header summary-container-hdr">Containers</div>';
  Object.entries(containers).forEach(([name, total], i) => {
    html += `<div class="summary-row" style="background:${i%2===0?'#f7f7f7':'#ffffff'}">
      <span class="summary-name">${name}</span>
      <span class="summary-total">${fmtNum(total)}</span>
    </div>`;
  });
  html += '</div>';

  container.innerHTML = html;
}

// ── CHECKLIST RENDER ──────────────────────────────────────
function renderChecklist() {
  const selected = DISHES.filter(d => state[d.id] > 0);
  const progressEl = document.getElementById('checklist-progress-bar');
  const contentEl = document.getElementById('checklist-content');

  if (selected.length === 0) {
    progressEl.innerHTML = '';
    contentEl.innerHTML = `<div class="empty-build">
      <div class="icon">✅</div>
      <p>No items selected</p>
      <small>Go to Order Entry and enter quantities first.</small>
    </div>`;
    return;
  }

  // Build progress
  updateProgress(selected);

  let html = '';
  selected.forEach(d => {
    const qty = state[d.id];
    const hasTort = d.tortillas && tortState[d.id];
    const cc = CAT_COLORS[d.cat] || { bg: '#3c5c68' };
    const allRows = [
      ...d.items,
      ...(d.containers || []),
      ...(d.utensils || []),
      ...(d.optional || []),
      ...(hasTort ? TORTILLA_ITEMS.map(t => [t.name, t.cat, t.base, t.unit]) : [])
    ];

    html += `<div class="checklist-dish">
      <div class="checklist-dish-header" style="background:${cc.bg}">
        <span>${d.name}</span><span>×${qty}</span>
      </div>
      <div class="checklist-items">`;

    allRows.forEach(([name, cat, base, unit], idx) => {
      const key = `${d.id}__${idx}`;
      const isChecked = checked[key] || false;
      const total = fmtNum(base * qty);
      html += `<div class="check-row${isChecked ? ' checked' : ''}" onclick="toggleCheck('${key}')" data-key="${key}">
        <div class="check-box"><span class="check-box-tick">✓</span></div>
        <span class="check-item-name">${name}</span>
        <span class="check-qty">${total}</span>
        <span class="check-unit">${unit}</span>
      </div>`;
    });

    html += `</div></div>`;
  });

  contentEl.innerHTML = html;
}

function toggleCheck(key) {
  checked[key] = !checked[key];
  const row = document.querySelector(`[data-key="${key}"]`);
  if (row) row.classList.toggle('checked', checked[key]);
  const selected = DISHES.filter(d => state[d.id] > 0);
  updateProgress(selected);
}

function updateProgress(selected) {
  let total = 0, done = 0;
  selected.forEach(d => {
    const qty = state[d.id];
    const hasTort = d.tortillas && tortState[d.id];
    const allRows = [
      ...d.items,
      ...(d.containers||[]),
      ...(d.utensils||[]),
      ...(d.optional||[]),
      ...(hasTort ? TORTILLA_ITEMS.map(t=>[t.name,t.cat,t.base,t.unit]):[])
    ];
    allRows.forEach((_, idx) => {
      const key = `${d.id}__${idx}`;
      total++;
      if (checked[key]) done++;
    });
  });
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('checklist-progress-bar').innerHTML = `
    <div class="checklist-progress">
      <div class="progress-stat"><div class="num stat-green">${done}</div><div class="lbl">Checked</div></div>
      <div class="progress-stat"><div class="num stat-coral">${total - done}</div><div class="lbl">Remaining</div></div>
      <div class="progress-stat"><div class="num stat-teal">${total}</div><div class="lbl">Total Items</div></div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-pct">${pct}% complete</div>
      </div>
    </div>`;
}

function uncheckAll() {
  Object.keys(checked).forEach(k => checked[k] = false);
  document.querySelectorAll('.check-row.checked').forEach(r => r.classList.remove('checked'));
  const selected = DISHES.filter(d => state[d.id] > 0);
  updateProgress(selected);
}

// ── TAB SWITCHING ─────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
  if (tab === 'build') renderBuild();
  if (tab === 'checklist') renderChecklist();
}

// ── PRINT ─────────────────────────────────────────────────
function printBuild() {
  renderBuild();
  document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
  document.getElementById('panel-build').style.display = 'block';
  window.print();
  document.querySelectorAll('.panel').forEach(p => p.style.display = '');
  switchTab('build');
}
function printChecklist() {
  renderChecklist();
  document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
  document.getElementById('panel-checklist').style.display = 'block';
  window.print();
  document.querySelectorAll('.panel').forEach(p => p.style.display = '');
  switchTab('checklist');
}

// ── INIT ─────────────────────────────────────────────────
buildOrderEntry();
</script>
